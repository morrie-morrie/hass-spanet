set_light_mode:
  name: Set Light Mode
  description: Set the light mode using a raw SpaNET mode string such as colour, fade, step, or party.
  fields:
    spa_id:
      required: true
      example: "12345"
      selector:
        text:
    mode:
      required: true
      example: colour
      selector:
        text:

set_light_colour:
  name: Set Light Colour
  description: Set the light colour using a raw SpaNET colour string such as white, blue, green, lime, teal, pink, red, or orange.
  fields:
    spa_id:
      required: true
      example: "12345"
      selector:
        text:
    colour:
      required: true
      example: blue
      selector:
        text:

set_light_speed:
  name: Set Light Speed
  description: Set animated light speed from 1 to 5.
  fields:
    spa_id:
      required: true
      example: "12345"
      selector:
        text:
    speed:
      required: true
      selector:
        number:
          min: 1
          max: 5

set_blower_mode:
  name: Set Blower Mode
  description: Set blower mode to off, ramp, or variable.
  fields:
    spa_id:
      required: true
      selector:
        text:
    mode:
      required: true
      selector:
        select:
          options:
            - off
            - ramp
            - variable

set_blower_speed:
  name: Set Blower Speed
  description: Set blower variable speed from 1 to 5.
  fields:
    spa_id:
      required: true
      selector:
        text:
    speed:
      required: true
      selector:
        number:
          min: 1
          max: 5

set_spa_datetime:
  name: Set Spa Date And Time
  description: Set the spa controller clock using SpaNET app format DD-MM-YYYY HH:MM.
  fields:
    spa_id:
      required: true
      selector:
        text:
    date_time:
      required: true
      example: "05-04-2026 08:57"
      selector:
        text:

create_sleep_timer:
  name: Create Sleep Timer
  description: Create a sleep timer profile using raw SpaNET timer fields.
  fields:
    spa_id:
      required: true
      selector:
        text:
    timer_number:
      required: true
      selector:
        number:
          min: 1
          max: 10
    timer_name:
      required: true
      selector:
        text:
    start_time:
      required: true
      selector:
        text:
    end_time:
      required: true
      selector:
        text:
    days_hex:
      required: true
      selector:
        text:
    is_enabled:
      required: false
      default: true
      selector:
        boolean:

update_sleep_timer:
  name: Update Sleep Timer
  description: Update an existing sleep timer profile using raw SpaNET timer fields.
  fields:
    spa_id:
      required: true
      selector:
        text:
    timer_id:
      required: true
      selector:
        number:
          min: 1
    timer_number:
      required: true
      selector:
        number:
          min: 1
          max: 10
    timer_name:
      required: true
      selector:
        text:
    start_time:
      required: true
      selector:
        text:
    end_time:
      required: true
      selector:
        text:
    days_hex:
      required: true
      selector:
        text:
    is_enabled:
      required: false
      default: true
      selector:
        boolean:

delete_sleep_timer:
  name: Delete Sleep Timer
  description: Delete a sleep timer profile by timer id.
  fields:
    spa_id:
      required: true
      selector:
        text:
    timer_id:
      required: true
      selector:
        number:
          min: 1
