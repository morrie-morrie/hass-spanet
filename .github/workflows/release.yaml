name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.1.15"
        required: true
      target:
        description: "Git ref to release from"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate manifest version matches tag
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"
          MANIFEST_VERSION=$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("custom_components/spanet/manifest.json").read_text())
          print(manifest["version"])
          PY
          )
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "manifest.json version ($MANIFEST_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

      - name: Create tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.name }}" "${{ github.event.inputs.target }}"
          git push origin "${{ steps.tag.outputs.name }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          name: SpaNET ${{ steps.tag.outputs.name }}
