name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.1.15"
        required: true
      target:
        description: "Git ref to release from"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(python - <<'PY'
            import json
            from pathlib import Path
            manifest = json.loads(Path("custom_components/spanet/manifest.json").read_text())
            print(manifest["version"])
            PY
            )
            echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate manifest version matches tag
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"
          MANIFEST_VERSION=$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("custom_components/spanet/manifest.json").read_text())
          print(manifest["version"])
          PY
          )
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "manifest.json version ($MANIFEST_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

      - name: Check whether tag already exists
        id: tag_exists
        shell: bash
        run: |
          if git rev-parse "${{ steps.tag.outputs.name }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          if [ "${{ steps.tag_exists.outputs.exists }}" = "true" ]; then
            echo "Tag ${{ steps.tag.outputs.name }} already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TARGET="${{ github.event.inputs.target || github.sha }}"
          git tag "${{ steps.tag.outputs.name }}" "$TARGET"
          git push origin "${{ steps.tag.outputs.name }}"

      - name: Create GitHub release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.tag.outputs.name }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.tag.outputs.name }} already exists"
            exit 0
          fi
          gh release create "${{ steps.tag.outputs.name }}" \
            --title "SpaNET ${{ steps.tag.outputs.name }}" \
            --generate-notes
